<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alışveriş Sayfası</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .product-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-around;
      gap: 20px;
    }

    .product {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
      width: 200px;
    }

    .product h3 {
      font-size: 18px;
    }

    .product p {
      font-size: 16px;
    }

    button {
      background-color: #4CAF50;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.3s;
      width: 100%;
    }

    button:hover {
      background-color: #45a049;
    }

    .sidebar {
      margin-left: 20px;
      position: fixed;
      top: 50%;
      right: 10px;
      transform: translateY(-50%);
    }

    .sidebar button {
      padding: 12px 20px;
      background-color: #FF5733;
      font-size: 18px;
      color: white;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Ürünler</h1>
    <div class="product-container">
      <!-- Ürün 1 -->
      <div class="product">
        <h3>Tezgah Stars Ön Bilet</h3>
        <p>1000 HL</p>
        <button onclick="addToCart('Tezgah Stars Ön Bilet', 1000)">Sepete Ekle</button>
      </div>

      <!-- Ürün 2 -->
      <div class="product">
        <h3>HLgame (1 Tur)</h3>
        <p>20 HL</p>
        <button onclick="addToCart('HLgame (1 Tur)', 20)">Sepete Ekle</button>
      </div>
    </div>

    <!-- Sepete Git Butonu -->
    <div class="sidebar">
      <button onclick="window.location.href='sepet.html';">Sepete Git</button>
    </div>
  </div>

  <script>
    let cart = [];

    function addToCart(productName, productPrice) {
      // Ürünü sepete ekle
      cart.push({ name: productName, price: productPrice });

      // Sepeti local storage'a kaydet
      localStorage.setItem('cart', JSON.stringify(cart));
      alert(productName + " sepete eklendi!");
    }
  </script>
</body>
</html>
